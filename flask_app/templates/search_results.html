{% extends "layout.html" %}
{% block content %}

<h2>Search Results for "{{ query }}"</h2>

{% if results|length == 0 %}
    <p>No matching stations found.</p>
{% else %}
    <div class="list-group mt-3">
        {% for s in results %}
            <a href="/station/{{ s.station_id }}" 
               class="list-group-item list-group-item-action">
                {{ s.name }}
            </a>
        {% endfor %}
    </div>
{% endif %}

{% endblock %}
